<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PILO — 3D Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box }
body {
  background: #040410; overflow: hidden;
  font-family: 'SF Pro Display', -apple-system, sans-serif;
}
canvas { display: block }

#ui { position: fixed; top: 24px; left: 28px; z-index: 10; color: #c8c8d8 }
#ui .logo-svg { width: 120px; height: auto; display: block; margin-bottom: 4px }
#ui .sub {
  font-size: 11px; letter-spacing: 3px; color: #334;
  text-transform: uppercase; margin-bottom: 6px;
}
#ui .stat {
  font-family: 'SF Mono', monospace; font-size: 11px;
  color: #335; cursor: pointer; transition: color .2s;
}
#ui .stat:hover { color: #668 }
#ui .stat b { color: #6a6a9f }

#bar {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  z-index: 10; display: flex; align-items: center; gap: 4px;
  padding: 5px 6px;
  background: rgba(8, 8, 24, .55);
  backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
  border: 1px solid rgba(255, 255, 255, .04); border-radius: 28px;
}
.btn {
  padding: 8px 22px; background: transparent;
  border: 1px solid rgba(255, 255, 255, .03); border-radius: 20px;
  color: #3a3a5a; cursor: pointer;
  font-size: 11px; font-weight: 400; letter-spacing: .6px;
  transition: all .3s; user-select: none;
}
.btn:hover { background: rgba(255, 255, 255, .04); color: #7a7a9a }
.btn.active {
  background: rgba(60, 100, 200, .08);
  border-color: rgba(60, 100, 200, .12); color: #6a90dd;
}

#demo-hint {
  position: fixed; bottom: 80px; left: 0; right: 0; text-align: center;
  font-size: 11px; letter-spacing: 1px; color: #4466aa; z-index: 10;
  opacity: 0; transition: opacity .3s; pointer-events: none;
}
#demo-hint.show { opacity: 1 }

#hint {
  position: fixed; bottom: 76px; left: 0; right: 0; text-align: center;
  color: #181828; font-size: 10px; letter-spacing: 1px; z-index: 10;
}

.vl {
  font-family: 'SF Mono', monospace; font-size: 10px; font-weight: 700;
  padding: 1px 4px; border-radius: 3px;
  white-space: nowrap; pointer-events: none;
  text-shadow: 0 0 6px rgba(0, 0, 0, .9);
}
.vl.eq { color: #ffc844 }
.vl.in { color: #44ccff }
.vl.bt { color: #445 }

#tp {
  position: fixed; top: 20px; right: 20px; z-index: 10;
  width: 280px; max-height: calc(100vh - 40px);
  background: rgba(4, 4, 14, .92); backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, .04); border-radius: 10px;
  overflow-y: auto; display: none;
  color: #aab; font-size: 11px; padding: 14px;
}
#tp h3 {
  font-size: 12px; color: #667; margin: 12px 0 6px;
  font-weight: 400; letter-spacing: 1px; text-transform: uppercase;
}
#tp h3:first-child { margin-top: 0 }
#tp .el { color: #556; line-height: 1.8 }
#tp .el span { color: #44ccff }
#tp .eq { color: #ffc844 }
#tp .ct { color: #334; font-size: 10px }
#tp::-webkit-scrollbar { width: 4px }
#tp::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, .06); border-radius: 2px }
</style>
</head>

<body>
<div id="ui">
  <svg class="logo-svg" viewBox="-2 -2 420 206" xmlns="http://www.w3.org/2000/svg">

    <path d="M160.0,27.8 Q154.1,26.8 153.8,32.8 L148.8,136.9 Q148.5,142.9 154.5,143.0 L188.4,143.7 Q194.4,143.8 194.0,137.8 L187.8,38.2 Q187.4,32.2 181.5,31.2 Z" fill="#dde"/>
    <path d="M263.5,6.0 Q263.6,0.0 257.7,0.9 L219.9,6.8 Q214.0,7.7 214.2,13.7 L219.1,137.8 Q219.3,143.8 225.3,143.7 L284.9,142.5 Q290.9,142.4 288.7,136.8 L285.2,128.4 Q283.0,122.8 277.0,123.3 L267.5,124.0 Q261.5,124.5 261.6,118.5 Z" fill="#dde"/>
    <path d="M413.1,15.6 Q413.1,9.6 407.1,10.4 L315.1,22.0 Q309.1,22.8 305.8,27.8 L295.6,43.0 Q292.3,48.0 292.9,54.0 L301.0,137.6 Q301.6,143.6 307.6,143.6 L364.4,143.8 Q370.4,143.8 374.7,139.6 L409.5,105.1 Q413.8,100.9 413.8,94.9 Z M358.4,40.8 Q364.3,39.6 364.5,45.6 L366.2,114.7 Q366.4,120.7 360.5,122.0 L347.6,125.0 Q341.7,126.3 341.3,120.3 L336.1,51.5 Q335.7,45.5 341.6,44.3 Z" fill="#dde" fill-rule="evenodd"/>
  </svg>
  <div class="sub">Sound Sleep with Sound</div>
  <div class="stat" onclick="togTopo()">
    <span id="fcount"></span> &middot; <b>&chi;=2</b>
  </div>
</div>

<div id="bar">
  <span class="btn" data-id="rebound" onclick="demoRebound()">Rebound</span>
  <span class="btn" data-id="wire"    onclick="togWire()">Wire</span>

</div>

<div id="demo-hint"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

/* ═══════════════════════════════════════════
   DATA — 32 vertices (Z-up), 60 triangles
   ═══════════════════════════════════════════ */

const P = [
  // equator ring (0–11): left 0–5, right 6–11
  -21, 18, 9,  -30, 14, 5,  -27,  1, 8,  -32,-11,11,  -31,-18, 8,  -12,-20,11,
   12,-20,11,   31,-18, 8,   32,-11,11,   27,  1, 8,   30, 14, 5,   21, 18, 9,
  // interior (12–21): paired a,b,c,d + axis o,f
   -4, 15, 7,    4, 15, 7,  -10,  0, 8,   10,  0, 8,
  -13,-12,13,   13,-12,13,   -6,-11,10,    6,-11,10,
    0,  0, 5,    0,-16, 7,
  // bottom ring (22–30) + center (31), all Z=0
  -28, 14, 0,    0, 17, 0,   28, 14, 0,   33,  0, 0,
   29,-13, 0,   10,-18, 0,  -10,-18, 0,  -29,-13, 0,  -33,  0, 0,
    0,  0, 0
];

const vN = [
  '1','2','3','4','5','6',  '6','5','4','3','2','1',
  'a','a','b','b','c','c',  'd','d','o','f',
  'A','E','A','B','C','D',  'D','C','B','X'
];

const vT = [
  'eq','eq','eq','eq','eq','eq',  'eq','eq','eq','eq','eq','eq',
  'in','in','in','in','in','in',  'in','in','in','in',
  'bt','bt','bt','bt','bt','bt',  'bt','bt','bt','bt'
];

const idx = [
  // top center
  12,20,13,  20,18,19,  19,18,21,
  // top right
  11,13,15,  11, 9,10,  11,15, 9,  13,20,15,
   9,15,17,   9,17, 8,   8,17, 6,   8, 6, 7,
  // top inner
  15,20,19,  15,19,17,  19,21, 6,  19, 6,17,
  // top left
   0,14,12,   0, 1, 2,   0, 2,14,  12,14,20,
   2,16,14,   2, 3,16,   3, 5,16,   3, 4, 5,
  // left inner
  14,18,20,  14,16,18,  18, 5,21,  18,16, 5,
  // side band (equator → bottom ring)
  23, 0,12,  23,12,13,  23,13,11,  23,22, 0,  22, 1, 0,
  22,30, 1,  30, 2, 1,  30, 3, 2,
   3, 4,29,   3,29,30,  29,28, 4,  28, 5, 4,
  28,21, 5,  28,27,21,  27, 6,21,  27, 7, 6,  27,26, 7,
   8, 7,26,   8,26,25,  25, 9, 8,  25,10, 9,  25,24,10,
  24,11,10,  24,23,11,
  // bottom fan (vertex 31 → ring 22–30)
  31,22,23,  31,23,24,  31,24,25,  31,25,26,  31,26,27,
  31,27,28,  31,28,29,  31,29,30,  31,30,22
];

/* ═══════════════════════════════════════════
   EDGES — extract unique undirected edges
   ═══════════════════════════════════════════ */

const edgeSet = new Map();
for (let i = 0; i < idx.length; i += 3) {
  const tri = [idx[i], idx[i + 1], idx[i + 2]];
  for (let k = 0; k < 3; k++) {
    const a = Math.min(tri[k], tri[(k + 1) % 3]);
    const b = Math.max(tri[k], tri[(k + 1) % 3]);
    edgeSet.set(a + ',' + b, [a, b]);
  }
}
const edges = [...edgeSet.values()];

/* ═══════════════════════════════════════════
   FACE COUNT — 52 product facets
   9 bottom-fan triangles merge into 1 base polygon
   ═══════════════════════════════════════════ */

const nV = P.length / 3;
const nF = idx.length / 3;
const nE = edges.length;

let bottomFan = 0;
for (let i = 0; i < idx.length; i += 3)
  if (idx[i] === 31 || idx[i + 1] === 31 || idx[i + 2] === 31) bottomFan++;

const facets = nF - bottomFan + 1;
document.getElementById('fcount').textContent = facets + ' facets';

/* ═══════════════════════════════════════════
   TOPOLOGY PANEL
   ═══════════════════════════════════════════ */

function buildTopo() {
  const absEdges = new Map();
  const absFaces = new Map();

  for (const [a, b] of edges) {
    const na = vN[a], nb = vN[b];
    const key = na <= nb ? na + '–' + nb : nb + '–' + na;
    if (!absEdges.has(key)) {
      const za = P[a * 3 + 2], zb = P[b * 3 + 2];
      const lo = Math.min(za, zb), hi = Math.max(za, zb);
      const zone = hi <= 0 ? 'bottom' : lo <= 0 ? 'side' : 'top';
      absEdges.set(key, { count: 1, zone });
    } else {
      absEdges.get(key).count++;
    }
  }

  for (let i = 0; i < idx.length; i += 3) {
    const key = [vN[idx[i]], vN[idx[i + 1]], vN[idx[i + 2]]].sort().join('–');
    absFaces.set(key, (absFaces.get(key) || 0) + 1);
  }

  const axisE = [...absEdges.values()].filter(v => v.count === 1).length;
  const pairE = absEdges.size - axisE;

  // header
  let h = '<h3>Topology</h3><div class="el" style="line-height:2">';
  h += `<b>Product:</b> ${facets} facets (${bottomFan}△ base → 1 polygon)<br>`;
  h += `V=${nV - 1} E=${nE - bottomFan} F=${facets} χ=2<br><br>`;
  h += `<b>Mesh:</b> ${nF} triangles<br>`;
  h += `V=${nV} E=${nE} F=${nF} χ=${nV - nE + nF}<br>`;
  h += `${nV} pos: ${pairE} pairs×2 + ${axisE} axis×1</div>`;

  // group edges by zone
  const groups = { top: [], side: [], bottom: [], axis: [] };
  for (const [key, val] of absEdges) {
    if (val.count === 1) groups.axis.push(key);
    else groups[val.zone].push(key);
  }

  const vertexClass = c => c >= '1' && c <= '6' ? 'eq' : c >= 'a' && c <= 'z' ? '' : 'ct';
  const fmtEdge = k => k.split('–')
    .map(p => `<span class="${vertexClass(p)}">${p}</span>`).join('–');

  for (const [label, list, mult] of [
    ['Top', groups.top, 2], ['Side', groups.side, 2],
    ['Bottom', groups.bottom, 2], ['Axis', groups.axis, 1]
  ]) {
    h += `<h3>${label} <span class="ct">(${list.length}×${mult})</span></h3>`;
    h += `<div class="el">${list.sort().map(fmtEdge).join(' &nbsp; ')}</div>`;
  }

  // vertex connections
  h += '<h3>Connections</h3><div class="el" style="line-height:2">';
  const conn = new Map();
  for (const [key] of absEdges) {
    const [a, b] = key.split('–');
    if (!conn.has(a)) conn.set(a, new Set());
    if (!conn.has(b)) conn.set(b, new Set());
    if (a !== b) { conn.get(a).add(b); conn.get(b).add(a); }
    else conn.get(a).add(a + '⟲');
  }
  const order = ['1','2','3','4','5','6','a','b','c','d','o','f','A','B','C','D','E','X'];
  for (const p of order) {
    if (!conn.has(p)) continue;
    h += `<span class="${vertexClass(p)}"><b>${p}</b></span> → `;
    h += [...conn.get(p)].sort().join(' ') + '<br>';
  }
  h += '</div>';

  document.getElementById('tp').innerHTML = h;
}

/* ═══════════════════════════════════════════
   RENDERER
   ═══════════════════════════════════════════ */

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.6;
document.body.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(innerWidth, innerHeight);
labelRenderer.domElement.style.cssText = 'position:absolute;top:0;pointer-events:none';
document.body.appendChild(labelRenderer.domElement);

const pmrem = new THREE.PMREMGenerator(renderer);
const envMap = pmrem.fromScene(new RoomEnvironment()).texture;
pmrem.dispose();

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x040410);
scene.environment = envMap;
scene.fog = new THREE.Fog(0x040410, 100, 240);

const cam = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.1, 500);
cam.position.set(55, 35, 55);

const controls = new OrbitControls(cam, renderer.domElement);
controls.target.set(0, 6, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.04;
controls.autoRotateSpeed = 1.2;
controls.update();

/* ═══════════════════════════════════════════
   GEOMETRY — Z-up to Y-up conversion
   ═══════════════════════════════════════════ */

const geo = new THREE.BufferGeometry();
const posBuf = new Float32Array(96);
for (let i = 0; i < 96; i += 3) {
  posBuf[i]     =  P[i];       // X → X
  posBuf[i + 1] =  P[i + 2];   // Z → Y (height)
  posBuf[i + 2] = -P[i + 1];   // -Y → Z (depth)
}
geo.setAttribute('position', new THREE.BufferAttribute(posBuf, 3));
geo.setIndex(idx);
geo.computeVertexNormals();

/* ═══════════════════════════════════════════
   MATERIAL
   ═══════════════════════════════════════════ */

const mat = new THREE.MeshPhysicalMaterial({
  color: new THREE.Color(0.17, 0.36, 0.67),
  roughness: 0.92,
  flatShading: true,
  side: THREE.DoubleSide,
  envMap,
  envMapIntensity: 0.3,
});

const mesh = new THREE.Mesh(geo, mat);
mesh.castShadow = true;
mesh.receiveShadow = true;
scene.add(mesh);

/* ═══════════════════════════════════════════
   EDGE LINES
   ═══════════════════════════════════════════ */

const edgeBuf = new Float32Array(edges.length * 6);
const edgeGeo = new THREE.BufferGeometry();
edgeGeo.setAttribute('position', new THREE.BufferAttribute(edgeBuf, 3));

const edgeMat = new THREE.LineBasicMaterial({
  color: 0x1a1a2a, transparent: true, opacity: 0.2,
});
const edgeLines = new THREE.LineSegments(edgeGeo, edgeMat);
scene.add(edgeLines);

function syncEdges() {
  const pos = geo.attributes.position.array;
  for (let i = 0; i < edges.length; i++) {
    const [a, b] = edges[i];
    const j = i * 6;
    edgeBuf[j]     = pos[a * 3];
    edgeBuf[j + 1] = pos[a * 3 + 1];
    edgeBuf[j + 2] = pos[a * 3 + 2];
    edgeBuf[j + 3] = pos[b * 3];
    edgeBuf[j + 4] = pos[b * 3 + 1];
    edgeBuf[j + 5] = pos[b * 3 + 2];
  }
  edgeGeo.attributes.position.needsUpdate = true;
}
syncEdges();

/* ═══════════════════════════════════════════
   SPRINGS — rest lengths from initial geometry
   ═══════════════════════════════════════════ */

const springs = edges.map(([a, b]) => {
  const dx = posBuf[b * 3]     - posBuf[a * 3];
  const dy = posBuf[b * 3 + 1] - posBuf[a * 3 + 1];
  const dz = posBuf[b * 3 + 2] - posBuf[a * 3 + 2];
  return { a, b, rest: Math.sqrt(dx * dx + dy * dy + dz * dz) };
});

/* ═══════════════════════════════════════════
   VERTEX DOTS + LABELS (wire mode only)
   ═══════════════════════════════════════════ */

const dotGroup = new THREE.Group();
const labelGroup = new THREE.Group();
dotGroup.visible = false;
labelGroup.visible = false;
scene.add(dotGroup);
scene.add(labelGroup);

const dotGeo = new THREE.SphereGeometry(0.45, 10, 10);
const dotColors = { eq: 0xffc844, 'in': 0x44ccff, bt: 0x444466 };

for (let i = 0; i < 32; i++) {
  const dot = new THREE.Mesh(dotGeo, new THREE.MeshBasicMaterial({ color: dotColors[vT[i]] }));
  dot.position.set(posBuf[i * 3], posBuf[i * 3 + 1], posBuf[i * 3 + 2]);
  dotGroup.add(dot);

  const div = document.createElement('div');
  div.className = 'vl ' + (vT[i] === 'eq' ? 'eq' : vT[i] === 'in' ? 'in' : 'bt');
  div.textContent = vN[i];
  const lbl = new CSS2DObject(div);
  lbl.position.set(posBuf[i * 3], posBuf[i * 3 + 1] + 1.2, posBuf[i * 3 + 2]);
  labelGroup.add(lbl);
}

/* ═══════════════════════════════════════════
   GROUND + LIGHTS
   ═══════════════════════════════════════════ */

const ground = new THREE.Mesh(
  new THREE.CircleGeometry(80, 64),
  new THREE.MeshStandardMaterial({ color: 0x060612, roughness: 0.95, metalness: 0.1 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.15;
ground.receiveShadow = true;
scene.add(ground);

scene.add(new THREE.AmbientLight(0x303050, 0.35));

const keyLight = new THREE.DirectionalLight(0xeee8dd, 1.0);
keyLight.position.set(30, 45, 25);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.left = -60;
keyLight.shadow.camera.right = 60;
keyLight.shadow.camera.top = 60;
keyLight.shadow.camera.bottom = -60;
keyLight.shadow.camera.near = 1;
keyLight.shadow.camera.far = 120;
keyLight.shadow.bias = -0.001;
scene.add(keyLight);

const fillA = new THREE.DirectionalLight(0xb0c0ee, 0.2);
fillA.position.set(-25, 15, -10);
scene.add(fillA);

const fillB = new THREE.DirectionalLight(0xffffff, 0.15);
fillB.position.set(0, 8, -35);
scene.add(fillB);

/* ═══════════════════════════════════════════
   PHYSICS — Verlet integration + springs
   ═══════════════════════════════════════════ */

const restPos  = new Float32Array(96);
const simPos   = new Float32Array(96);
const prevPos  = new Float32Array(96);
const pokeVel  = new Float32Array(96);
let physOn = false;

const PHY = {
  foam:    { damp: 0.06, iters: 3, shape: 0.025, grav: -18 },
  rebound: { damp: 0.14, iters: 3, shape: 0.003, grav: -18 },
};

function initPhys() {
  const pos = geo.attributes.position.array;
  restPos.set(pos);
  simPos.set(pos);
  prevPos.set(pos);
  pokeVel.fill(0);
  // lift slightly for drop-in animation
  for (let i = 1; i < 96; i += 3) { simPos[i] += 2; prevPos[i] += 2; }
  physOn = true;
}

function stepPhys(dt) {
  if (!physOn) return;
  const p = PHY[demoPhyKey] || PHY.foam;

  // Verlet integration with gravity
  for (let i = 0; i < 96; i++) {
    const vel = (simPos[i] - prevPos[i]) * (1 - p.damp);
    prevPos[i] = simPos[i];
    simPos[i] += vel + pokeVel[i] * dt + (i % 3 === 1 ? p.grav * dt * dt : 0);
    pokeVel[i] *= 0.85;
  }

  // spring constraints
  for (let it = 0; it < p.iters; it++) {
    for (const s of springs) {
      const ai = s.a * 3, bi = s.b * 3;
      const dx = simPos[bi] - simPos[ai];
      const dy = simPos[bi + 1] - simPos[ai + 1];
      const dz = simPos[bi + 2] - simPos[ai + 2];
      const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
      if (dist < 0.001) continue;
      const f = (dist - s.rest) / dist * 0.5;
      simPos[ai] += dx * f;  simPos[ai + 1] += dy * f;  simPos[ai + 2] += dz * f;
      simPos[bi] -= dx * f;  simPos[bi + 1] -= dy * f;  simPos[bi + 2] -= dz * f;
    }
  }

  // shape restoration
  for (let i = 0; i < 96; i++) simPos[i] += (restPos[i] - simPos[i]) * p.shape;

  // ground collision
  for (let i = 1; i < 96; i += 3) {
    if (simPos[i] < -0.15) { simPos[i] = -0.15; prevPos[i] = -0.15; }
  }

  // write back to geometry
  const pos = geo.attributes.position.array;
  pos.set(simPos);
  geo.attributes.position.needsUpdate = true;
  geo.computeVertexNormals();
  geo.computeBoundingSphere();
  syncEdges();

  // sync vertex dots + labels
  for (let i = 0; i < 32; i++) {
    dotGroup.children[i].position.set(pos[i * 3], pos[i * 3 + 1], pos[i * 3 + 2]);
    labelGroup.children[i].position.set(pos[i * 3], pos[i * 3 + 1] + 1.2, pos[i * 3 + 2]);
  }
}

/* ═══════════════════════════════════════════
   POKE — click to push vertices down
   ═══════════════════════════════════════════ */

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let pokeStart = null;

renderer.domElement.addEventListener('pointerdown', e => {
  if (e.button === 0 && physOn) pokeStart = { x: e.clientX, y: e.clientY };
});

renderer.domElement.addEventListener('pointerup', e => {
  if (!pokeStart || !physOn) return;
  const dx = e.clientX - pokeStart.x;
  const dy = e.clientY - pokeStart.y;
  pokeStart = null;
  if (Math.sqrt(dx * dx + dy * dy) > 5) return;

  mouse.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  raycaster.setFromCamera(mouse, cam);
  const hits = raycaster.intersectObject(mesh);
  if (!hits.length) return;

  const hit = hits[0].point;
  for (let i = 0; i < 32; i++) {
    const px = simPos[i * 3] - hit.x;
    const py = simPos[i * 3 + 1] - hit.y;
    const pz = simPos[i * 3 + 2] - hit.z;
    const dist = Math.sqrt(px * px + py * py + pz * pz);
    const falloff = Math.max(0, 1 - dist / 15);
    pokeVel[i * 3 + 1] -= 8 * falloff * falloff;
  }
});

/* ═══════════════════════════════════════════
   REBOUND DEMO — memory foam slow recovery
   ═══════════════════════════════════════════ */

let demoActive = false;
let demoTime = 0;
let demoPhyKey = null;

const demoHint = document.getElementById('demo-hint');
const btn = id => document.querySelector(`[data-id="${id}"]`);

function endDemo() {
  if (!demoActive) return;
  demoPhyKey = null;
  demoActive = false;
  demoTime = 0;
  PHY.rebound.shape = 0.003;
  btn('rebound').classList.remove('active');
  demoHint.classList.remove('show');
}

window.demoRebound = () => {
  endDemo();
  simPos.set(restPos);
  prevPos.set(restPos);
  pokeVel.fill(0);
  if (!physOn) physOn = true;

  demoActive = true;
  demoTime = 0;
  demoPhyKey = 'rebound';
  PHY.rebound.shape = 0.003;

  // push top vertices down proportional to height
  for (let i = 0; i < 32; i++) {
    const h = Math.max(0, restPos[i * 3 + 1] / 13);
    pokeVel[i * 3 + 1] -= 16 * h * h;
  }

  demoHint.textContent = '▸ Memory Foam — slow rebound';
  demoHint.classList.add('show');
  btn('rebound').classList.add('active');
};

function stepDemo(dt) {
  if (!demoActive) return;
  demoTime += dt;
  // gradually restore shape after 2s
  if (demoTime > 2)
    PHY.rebound.shape = 0.003 + (0.025 - 0.003) * Math.min(1, (demoTime - 2) / 4);
  if (demoTime > 7) endDemo();
}

/* ═══════════════════════════════════════════
   CONTROLS
   ═══════════════════════════════════════════ */

let wireOn = false;

window.togWire = () => {
  wireOn = !wireOn;
  btn('wire').classList.toggle('active', wireOn);
  if (wireOn) {
    mat.opacity = 0; mat.transparent = true; mat.depthWrite = false;
    edgeMat.color.set(0x4466aa); edgeMat.opacity = 0.85;
    dotGroup.visible = true; labelGroup.visible = true;
  } else {
    mat.opacity = 1; mat.transparent = false; mat.depthWrite = true;
    edgeMat.color.set(0x1a1a2a); edgeMat.opacity = 0.2;
    dotGroup.visible = false; labelGroup.visible = false;
  }
  mat.needsUpdate = true;
};

window.togRot = () => {
  controls.autoRotate = !controls.autoRotate;
  btn('rotate').classList.toggle('active', controls.autoRotate);
};

let topoOn = false;
window.togTopo = () => {
  topoOn = !topoOn;
  document.getElementById('tp').style.display = topoOn ? 'block' : 'none';
};

/* ═══════════════════════════════════════════
   RESIZE
   ═══════════════════════════════════════════ */

addEventListener('resize', () => {
  cam.aspect = innerWidth / innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  labelRenderer.setSize(innerWidth, innerHeight);
});

/* ═══════════════════════════════════════════
   INIT + LOOP
   ═══════════════════════════════════════════ */

buildTopo();
initPhys();

let prevTime = 0;
(function loop(t) {
  requestAnimationFrame(loop);
  const dt = Math.min((t - prevTime) / 1000, 0.05);
  prevTime = t;
  stepDemo(dt);
  stepPhys(dt);
  controls.update();
  renderer.render(scene, cam);
  labelRenderer.render(scene, cam);
})(0);
</script>
</body>
</html>
